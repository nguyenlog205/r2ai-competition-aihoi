# ==============================================================================
# FILE: config/database/local_graphdb.yml
# DESCRIPTION: Docker Compose configuration for local Neo4j Database
# ==============================================================================
version: '3.8'

services:
  neo4j_local:
    image: neo4j:5.15.0
    container_name: legal_graph_db
    restart: unless-stopped
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/your_local_password
      
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_apoc_export_file_enabled=true
      - NEO4J_apoc_import_file_enabled=true
    volumes:
      - ../../data/neo4j_local/data:/data
      - ../../data/neo4j_local/logs:/logs
      - ../../data/neo4j_local/plugins:/plugins