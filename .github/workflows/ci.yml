# ==============================================================================
# FILE: .github/workflows/ci.yml
# DESCRIPTION: Continuous Integration Pipeline for Legal Graph RAG
# ==============================================================================

name: Legal Graph RAG CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  integration-test:
    name: Run Pytest and Neo4j Integration
    runs-on: ubuntu-latest

    services:
      neo4j_test_db:
        image: neo4j:5.15.0
        env:
          NEO4J_AUTH: neo4j/your_local_password
          NEO4J_PLUGINS: '["apoc"]'
        ports:
          - 7687:7687
        options: >-
          --health-cmd "cypher-shell -u neo4j -p your_local_password 'RETURN 1' || exit 1"
          --health-interval 10s
          --health-timeout 10s
          --health-retries 10

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Unit Tests (Crawler)
      run: |
        pytest tests/preprocessing/test_crawling.py -v

    - name: Run Integration Tests (Neo4j)
      env:
        PYTHONPATH: ${{ github.workspace }}
      run: |
        pytest tests/pipeline/test_graph_db.py -v